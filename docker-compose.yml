services:

  mongodb:
    image: mongo:7
    container_name: k8s-analyzer-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"   # optional: only needed if you want to reach Mongo from your host too
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: k8s-analyzer-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Docker-networked values — override anything set in backend/.env
      MONGO_URI: mongodb://mongodb:27017
      OLLAMA_HOST: http://host.docker.internal:11434
      PROMETHEUS_URL: http://host.docker.internal:9090
      KUBECONFIG: /home/appuser/.kube/config
    volumes:
      # Generated by generate-docker-kubeconfig.ps1 — has 127.0.0.1 swapped
      # for host.docker.internal so it's reachable from inside the container.
      - ./kubeconfig-docker.yaml:/home/appuser/.kube/config:ro
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    extra_hosts:
      # Redundant on Docker Desktop (which provides this automatically) but
      # required on native Linux Docker — harmless to include either way.
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    container_name: k8s-analyzer-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mongo_data: